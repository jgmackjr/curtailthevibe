<!DOCTYPE html>
<html>
<head>
<title>curtail the vibe</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap" rel="stylesheet">

<style>
body {
margin: 0;
font-family: 'Inter', sans-serif;
background: #0a0a0a;
color: #eaeaea;
}

/* Top navigation */
nav {
display: flex;
justify-content: center;
gap: 60px;
padding: 20px;
border-bottom: 1px solid #222;
position: sticky;
top: 0;
background: rgba(10,10,10,0.9);
backdrop-filter: blur(10px);
}

nav a {
color: #aaa;
text-decoration: none;
font-size: 14px;
letter-spacing: 2px;
transition: 0.3s;
}

nav a:hover {
color: #fff;
}

/* Main section */
.hero {
height: 80vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
text-align: center;
padding: 20px;
}

h1 {
font-weight: 200;
font-size: 42px;
letter-spacing: 3px;
margin-bottom: 10px;
}

p {
color: #777;
font-size: 14px;
letter-spacing: 2px;
}

/* Subtle fade-in */
.fade {
opacity: 0;
animation: fadeIn 2s ease forwards;
}

@keyframes fadeIn {
to { opacity: 1; }
}
</style>
</head>

<body>

<!-- Top Bar -->
<nav>
<a href="#">Music</a>
<a href="#">Art</a>
<a href="#">Shop</a>
</nav>

<!-- Main Content -->
<div class="hero fade">
<h1>curtail the vibe</h1>
<p>after the meadow lights go out</p>
</div>

</body>
</html>
